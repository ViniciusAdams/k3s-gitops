apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash-spacetrack
  namespace: logstash-spacetrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash-spacetrack
  template:
    metadata:
      labels:
        app: logstash-spacetrack
    spec:
      containers:
        - name: logstash
          image: viniciusadams91/logstash-opensearch:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
            - name: config
              mountPath: /usr/share/logstash/pipeline/spacetrack.conf
              subPath: spacetrack.conf
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: logstash-spacetrack-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash-spacetrack
  namespace: logstash-spacetrack
spec:
  selector:
    app: logstash-spacetrack
  ports:
    - name: http
      protocol: TCP
      port: 8090
      targetPort: 8090