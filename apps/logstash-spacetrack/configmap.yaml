apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-spacetrack-config
  namespace: logstash-spacetrack
data:
  #logstash core settings
  logstash.yml: |
    # listen on all network interfaces, so logstash can receive data from other pods in the cluster
    http.host: "0.0.0.0"
    #disabling xpack monitoring because I don't need it and it can cause performance issues,might add in the future
    xpack.monitoring.enabled: false

    queue.type: persisted
    queue.max_bytes: 2gb
    queue.checkpoint.writes: 1024
    queue.drain: true

    pipeline.workers: 2
    pipeline.batch.size: 125
    pipeline.batch.delay: 50

    dead_letter_queue.enable: true

  pipelines.yml: |
    - pipeline.id: spacetrack
      path.config: "/usr/share/logstash/pipeline/spacetrack.conf"

  spacetrack.conf: |
    input {
      http {
        port => 8090
        codec => json_lines
        max_pending_requests => 50
        response_code => 202
      }
    }

    filter {
      mutate {
        add_field => {
          "pipeline_name" => "spacetrack"
          "source_system" => "space-track"
        }
      }

      date {
        match => ["EPOCH", "ISO8601"]
        target => "@timestamp"
      }

      mutate {
        convert => {
          "NORAD_CAT_ID" => "integer"
          "MEAN_MOTION" => "float"
          "ECCENTRICITY" => "float"
          "INCLINATION" => "float"
          "RA_OF_ASC_NODE" => "float"
          "ARG_OF_PERICENTER" => "float"
          "MEAN_ANOMALY" => "float"
        }
      }
    }

    output {
      opensearch {
        hosts => ["https://opensearch-cluster-master.opensearch.svc.cluster.local:9200"]
        index => "spacetrack-gp-%{+YYYY.MM.dd}"
        user => "${OPENSEARCH_USERNAME}"
        password => "${OPENSEARCH_PASSWORD}"
        ssl_certificate_verification => false
        #most important line of code where is where the unique document id is generated for each record, this is important to prevent duplicates in opensearch and to allow for updates if the same record is ingested again
        document_id => "%{doc_id}"
      }
    }