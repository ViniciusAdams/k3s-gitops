apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opensearch-project.github.io/helm-charts/
    chart: opensearch-dashboards
    targetRevision: 2.13.0
    helm:
      values: |
        image:
          tag: "2.8.0"

        replicaCount: 1

        service:
          type: ClusterIP
          port: 5601

        opensearchHosts: "https://opensearch-cluster-master:9200"

        secretMounts:
          - name: opensearch-certs
            secretName: opensearch-certs
            path: /usr/share/opensearch-dashboards/config/certs

        extraEnvs:
          - name: OPENSEARCH_USERNAME
            valueFrom:
              secretKeyRef:
                name: dashboards-secrets
                key: OPENSEARCH_USERNAME
          - name: OPENSEARCH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: dashboards-secrets
                key: OPENSEARCH_PASSWORD

        config:
          opensearch_dashboards.yml: |
            opensearch.hosts: [ "https://opensearch-cluster-master:9200" ]
            opensearch.ssl.verificationMode: none
            opensearch.username: "${OPENSEARCH_USERNAME}"
            opensearch.password: "${OPENSEARCH_PASSWORD}"

        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "3Gi"

  destination:
    server: https://kubernetes.default.svc
    namespace: opensearch

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true