clusterName: opensearch-cluster

nodeGroup: master
singleNode: true

replicas: 1

opensearchJavaOpts: "-Xms512m -Xmx512m"

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

persistence:
  enabled: false

extraEnvs:
  - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
    value: "ChangeThisLater123!"

service:
  type: ClusterIP

securityConfig:
  enabled: false

config:
  opensearch.yml: |
    cluster.name: opensearch-cluster
    network.host: 0.0.0.0
    discovery.type: single-node
    plugins.security.disabled: false