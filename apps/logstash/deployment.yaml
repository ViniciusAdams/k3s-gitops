apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: viniciusadams91/logstash-opensearch:1.0.0
          imagePullPolicy: IfNotPresent

          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: logstash-secrets
                  key: API_KEY
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: logstash-secrets
                  key: OPENSEARCH_USER
            - name: OPENSEARCH_PASS
              valueFrom:
                secretKeyRef:
                  name: logstash-secrets
                  key: OPENSEARCH_PASS

          volumeMounts:
            # Mount the pipeline file
            - name: logstash-config
              mountPath: /usr/share/logstash/pipeline/nasa.conf
              subPath: nasa.conf

            # Mount the Logstash runtime configuration
            - name: logstash-config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml

      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config