apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: logging
data:
  nasa.conf: |
    input {
      http_poller {
        urls => {
          nasa => {
            method => get
            url => "https://api.nasa.gov/neo/rest/v1/feed?start_date=START_DATE&end_date=END_DATE&api_key=${API_KEY}"
          }
        }

        schedule => { cron => "0 * * * * UTC" }
        codec => "json"
      }
    }

    filter {
      mutate {
        add_field => { "source" => "nasa_neo" }
      }
    }

    output {
      opensearch {
        hosts => ["https://opensearch-cluster-master.opensearch.svc.cluster.local:9200"]
        user => "${OPENSEARCH_USER}"
        password => "${OPENSEARCH_PASS}"
        index => "nasa-neo-%{+YYYY.MM.dd}"
        ssl => true
        ssl_certificate_verification => false
      }

      stdout { codec => rubydebug }
    }