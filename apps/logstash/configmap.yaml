apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: logging
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

  nasa.conf: |
    input {
      http_poller {
        urls => {
          nasa => {
            method => get
            url => "https://api.nasa.gov/neo/rest/v1/feed?start_date=2026-03-14&end_date=2026-03-14&api_key=${API_KEY}"
            headers => {
              Accept => "application/json"
            }
          }
        }

        schedule => { cron => "0 * * * * UTC" }
        codec => "json"
        request_timeout => 60
      }
    }

    filter {
      mutate {
        add_field => { "source" => "nasa_neo" }
      }

      ruby {
        code => '
          neo_events = []
          neo_map = event.get("near_earth_objects")

          if neo_map.is_a?(Hash)
            neo_map.each do |date, objects|
              if objects.is_a?(Array)
                objects.each do |obj|
                  obj["neo_reference_date"] = date
                  neo_events << obj
                end
              end
            end
          end

          event.set("neo_events", neo_events)
        '
      }

      split {
        field => "neo_events"
      }

      ruby {
        code => '
          neo = event.get("neo_events")

          if neo.is_a?(Hash)
            neo.each { |k, v| event.set(k, v) }
          end
        '
      }

      mutate {
        remove_field => [
          "neo_events",
          "near_earth_objects",
          "links",
          "@version"
        ]
      }

      if [estimated_diameter][kilometers][estimated_diameter_min] {
        mutate {
          add_field => {
            "estimated_diameter_min_km" => "%{[estimated_diameter][kilometers][estimated_diameter_min]}"
            "estimated_diameter_max_km" => "%{[estimated_diameter][kilometers][estimated_diameter_max]}"
          }
        }
      }

      if [close_approach_data][0][close_approach_date_full] {
        mutate {
          add_field => {
            "close_approach_date_full" => "%{[close_approach_data][0][close_approach_date_full]}"
            "relative_velocity_kph" => "%{[close_approach_data][0][relative_velocity][kilometers_per_hour]}"
            "miss_distance_km" => "%{[close_approach_data][0][miss_distance][kilometers]}"
            "orbiting_body" => "%{[close_approach_data][0][orbiting_body]}"
          }
        }
      }

      mutate {
        convert => {
          "estimated_diameter_min_km" => "float"
          "estimated_diameter_max_km" => "float"
          "relative_velocity_kph" => "float"
          "miss_distance_km" => "float"
          "absolute_magnitude_h" => "float"
          "is_potentially_hazardous_asteroid" => "boolean"
          "is_sentry_object" => "boolean"
        }
      }

      date {
        match => [ "neo_reference_date", "yyyy-MM-dd" ]
        target => "@timestamp"
      }

      fingerprint {
        source => ["id"]
        target => "[@metadata][document_id]"
        method => "SHA256"
      }
    }

    output {
      opensearch {
        hosts => ["https://opensearch-cluster-master.opensearch.svc.cluster.local:9200"]
        user => "${OPENSEARCH_USER}"
        password => "${OPENSEARCH_PASS}"
        index => "nasa-neo-%{+YYYY.MM.dd}"
        document_id => "%{[@metadata][document_id]}"
        ssl => true
        ssl_certificate_verification => false
      }

      stdout {
        codec => rubydebug
      }
    }