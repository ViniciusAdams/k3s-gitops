apiVersion: batch/v1
kind: CronJob
metadata:
  name: ml-pipeline
spec:
  schedule: "*/15 * * * *"

 
  concurrencyPolicy: Forbid


  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
     
      backoffLimit: 1

      
      ttlSecondsAfterFinished: 300

      template:
        spec:
          containers:
            - name: ml-pipeline
              image: viniciusadams91/ml-app:latest
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: ml-config
                - secretRef:
                    name: ml-secret

          restartPolicy: Never